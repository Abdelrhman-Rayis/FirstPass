<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080"></head>
<body>
<template>
<div id="root" data-composition-id="01-hook" data-start="0" data-duration="5.5" data-width="1920" data-height="1080">
  <div class="clip bg" data-start="0" data-duration="5" data-track-index="0"></div>
  <div id="line1" class="clip" data-start="0" data-duration="1.6" data-track-index="1">80% of a contract is boilerplate.</div>
  <div id="line2" class="clip" data-start="1.6" data-duration="1.6" data-track-index="2">Agreed a hundred times before.</div>
  <div id="line3" class="clip" data-start="3.2" data-duration="1.8" data-track-index="3">
    <span class="w">Yet</span> <span class="w">every</span> <span class="w">single</span> <span class="w">one</span> <span class="w">still</span> <span class="w">gets</span> <span class="w">a</span> <span class="w">full</span> <span class="w">cold</span> <span class="w">read</span><br>
    <span class="w hl">by a scarce, expensive human.</span>
  </div>
</div>
</template>
<style>
  :root{--ink:#15171C;--orange:#E14E12;--cream:#FFFFFF;--muted:#FF6633}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;background:var(--ink)}
  #root{position:relative;width:1920px;height:1080px;font-family:Arial,sans-serif}
  .bg{position:absolute;inset:0;background:var(--ink)}
  #line1,#line2{position:absolute;top:420px;left:0;right:0;text-align:center;font-size:64px;font-weight:800;color:var(--cream);letter-spacing:-0.03em}
  #line3{position:absolute;top:520px;left:160px;right:160px;text-align:center;font-size:38px;font-weight:700;color:var(--cream);line-height:1.3;letter-spacing:-0.02em}
  #line3 .w{display:inline-block}
  #line3 .hl{color:var(--orange)}
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  tl.fromTo("#line1",{opacity:0,scale:0.92},{opacity:1,scale:1,duration:0.7,ease:"power3.out"},0)
    .to("#line1",{opacity:0.25,duration:0.3,ease:"power2.in"},1.5);
  tl.fromTo("#line2",{opacity:0,scale:0.92},{opacity:1,scale:1,duration:0.7,ease:"power3.out"},1.6)
    .to("#line2",{opacity:0.25,duration:0.3,ease:"power2.in"},3.1);
  const words=document.querySelectorAll("#line3 .w");
  words.forEach((w,i)=>{
    tl.fromTo(w,{opacity:0,y:12},{opacity:1,y:0,duration:0.35,ease:"power3.out"},3.2+i*0.15);
  });
  window.__timelines["01-hook"]=tl;
</script>
</template>
</body>
</html>
