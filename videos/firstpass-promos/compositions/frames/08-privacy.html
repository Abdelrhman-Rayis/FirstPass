<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080"></head>
<body>
<template>
<div id="root" data-composition-id="08-privacy" data-start="0" data-duration="5.4" data-width="1920" data-height="1080">
  <div class="clip bg" data-start="0" data-duration="5" data-track-index="0"></div>
  <!-- Lock SVG -->
  <svg id="lock" class="clip" data-start="0" data-duration="5" data-track-index="1" viewBox="0 0 64 64" width="64" height="64" style="position:absolute;top:200px;left:928px">
    <rect x="12" y="28" width="40" height="28" rx="4" fill="none" stroke="#E14E12" stroke-width="3"/>
    <path d="M20 28v-8a12 12 0 0 1 24 0v8" fill="none" stroke="#E14E12" stroke-width="3" stroke-linecap="round"/>
    <circle cx="32" cy="42" r="4" fill="#E14E12"/>
    <line x1="32" y1="44" x2="32" y2="50" stroke="#E14E12" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <div id="title" class="clip" data-start="0.8" data-duration="4.2" data-track-index="2">On your own servers.</div>
  <div id="l1" class="clip line" data-start="2.0" data-duration="3" data-track-index="3">The engine needs no model.</div>
  <div id="l2" class="clip line" data-start="3.0" data-duration="2" data-track-index="4">The reasoning layer is local.</div>
  <div id="l3" class="clip line" data-start="3.8" data-duration="1.2" data-track-index="5">No contract text ever touches the cloud.</div>
</div>
</template>
<style>
  :root{--ink:#15171C;--orange:#E14E12;--cream:#FFFFFF;--muted:#FF6633}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;background:var(--ink)}
  #root{position:relative;width:1920px;height:1080px;font-family:Arial,sans-serif}
  .bg{position:absolute;inset:0;background:var(--ink)}
  #title{position:absolute;top:310px;left:0;right:0;text-align:center;font-size:52px;font-weight:800;color:var(--cream);letter-spacing:-0.03em}
  .line{position:absolute;left:0;right:0;text-align:center;font-size:24px;font-weight:400;color:var(--muted);letter-spacing:-0.01em}
  #l1{top:420px} #l2{top:470px} #l3{top:520px}
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  // SVG self-draw via stroke-dasharray
  const lockPaths=document.querySelectorAll("#lock rect,#lock path,#lock circle,#lock line");
  lockPaths.forEach(p=>{
    const len=p.getTotalLength();
    p.style.strokeDasharray=len;
    p.style.strokeDashoffset=len;
    tl.to(p,{strokeDashoffset:0,duration:0.6,ease:"power3.out"},0)
      .to(p,{opacity:1,duration:0.01},0);
  });
  tl.fromTo("#title",{opacity:0,y:15},{opacity:1,y:0,duration:0.7,ease:"power3.out"},0.8);
  tl.fromTo("#l1",{opacity:0,x:-10},{opacity:1,x:0,duration:0.5,ease:"power3.out"},2.0);
  tl.fromTo("#l2",{opacity:0,x:-10},{opacity:1,x:0,duration:0.5,ease:"power3.out"},3.0);
  tl.fromTo("#l3",{opacity:0,x:-10},{opacity:1,x:0,duration:0.5,ease:"power3.out"},3.8);
  // Subtle jitter on lock
  tl.to("#lock",{x:"+=1",duration:0.8,ease:"sine.inOut"},1.5)
    .to("#lock",{x:"-=1",duration:0.8,ease:"sine.inOut"},2.3)
    .to("#lock",{x:"+=0.5",duration:0.6,ease:"sine.inOut"},3.1)
    .to("#lock",{x:"-=0.5",duration:0.6,ease:"sine.inOut"},3.7);
  window.__timelines["08-privacy"]=tl;
</script>
</template>
</body>
</html>
