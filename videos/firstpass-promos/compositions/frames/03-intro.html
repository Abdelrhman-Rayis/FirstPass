<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080"></head>
<body>
<template>
<div id="root" data-composition-id="03-intro" data-start="0" data-duration="5.5" data-width="1920" data-height="1080">
  <div class="clip bg" data-start="0" data-duration="5" data-track-index="0"></div>
  <div id="kicker" class="clip" data-start="0" data-duration="5" data-track-index="1">Introducing</div>
  <div id="name" class="clip" data-start="1.2" data-duration="3.8" data-track-index="2">FirstPass.</div>
  <div id="tag1" class="clip" data-start="2.8" data-duration="2.2" data-track-index="3">reads every contract</div>
  <div id="tag2" class="clip" data-start="3.5" data-duration="1.5" data-track-index="4">checks it against your playbook</div>

</div>
</template>
<style>
  :root{--ink:#15171C;--orange:#E14E12;--cream:#FFFFFF;--muted:#FF6633}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;background:var(--ink)}
  #root{position:relative;width:1920px;height:1080px;font-family:Arial,sans-serif}
  .bg{position:absolute;inset:0;background:var(--ink)}
  #kicker{position:absolute;top:290px;left:0;right:0;text-align:center;font-family:"IBM Plex Mono",monospace;font-size:16px;font-weight:500;color:var(--orange);text-transform:uppercase;letter-spacing:0.14em}
  #name{position:absolute;top:340px;left:0;right:0;text-align:center;font-size:130px;font-weight:800;color:var(--cream);letter-spacing:-0.04em}
  #tag1,#tag2,#tag3{position:absolute;left:0;right:0;text-align:center;color:var(--muted);letter-spacing:-0.01em}
  #tag1{top:590px;font-size:28px;font-weight:400}
  #tag2{top:640px;font-size:28px;font-weight:400}
  #tag3{top:690px;font-size:28px;font-weight:400}
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  tl.fromTo("#kicker",{opacity:0,y:-12},{opacity:1,y:0,duration:0.5,ease:"power3.out"},0)
    .to("#kicker",{opacity:0,duration:0.3,ease:"power2.in"},1.1);
  tl.fromTo("#name",{opacity:0,scale:0.7},{opacity:1,scale:1,duration:0.9,ease:"power3.out"},1.2);
  // Glow bloom behind name
  tl.fromTo("#name",{textShadow:"0 0 0px rgba(225,78,18,0)"},{textShadow:"0 0 60px rgba(225,78,18,0.4)",duration:1.5,ease:"power3.in"},1.5);
  tl.fromTo("#tag1",{opacity:0,x:-20},{opacity:1,x:0,duration:0.4,ease:"power3.out"},2.8);
  tl.fromTo("#tag2",{opacity:0,x:-20},{opacity:1,x:0,duration:0.4,ease:"power3.out"},3.5);
  tl.fromTo("#tag3",{opacity:0,x:-20},{opacity:1,x:0,duration:0.4,ease:"power3.out"},4.0);
  window.__timelines["03-intro"]=tl;
</script>
