<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080"></head>
<body>
<template>
<div id="root" data-composition-id="04-dashboard" data-start="0" data-duration="8.5" data-width="1920" data-height="1080">
  <div class="clip bg" data-start="0" data-duration="8" data-track-index="0"></div>
  <div id="window" class="clip" data-start="0.3" data-duration="7.7" data-track-index="1">
    <img src="assets/shot_dashboard.png" alt="Dashboard" style="width:100%;height:100%;object-fit:contain">
  </div>
  <div id="callout1" class="clip callout g" data-start="2.0" data-duration="6" data-track-index="2">GREEN &mdash; AUTO-CLEAR</div>
  <div id="callout2" class="clip callout a" data-start="3.0" data-duration="5" data-track-index="3">AMBER &mdash; CONFIRM</div>
  <div id="callout3" class="clip callout r" data-start="4.0" data-duration="4" data-track-index="4">RED &mdash; ESCALATE</div>
  <div id="tag" class="clip" data-start="6.5" data-duration="1.5" data-track-index="5">The risky twenty percent, waiting for a human.</div>
</div>
</template>
<style>
  :root{--ink:#15171C;--orange:#E14E12;--cream:#FFFFFF;--muted:#FF6633;--green:#12A150;--amber:#C07C00;--red:#DE3226}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;background:var(--ink)}
  #root{position:relative;width:1920px;height:1080px;font-family:Arial,sans-serif}
  .bg{position:absolute;inset:0;background:var(--ink)}
  #window{position:absolute;top:60px;left:100px;width:1720px;height:880px;border:1px solid #282726;border-radius:8px;overflow:hidden;background:#1A1A1A}
  .callout{position:absolute;font-family:"IBM Plex Mono",monospace;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:8px 16px;border-radius:6px}
  .callout.g{top:140px;right:80px;color:var(--green);background:rgba(18,161,80,0.15);border:1px solid rgba(18,161,80,0.3)}
  .callout.a{top:240px;right:80px;color:var(--amber);background:rgba(192,124,0,0.15);border:1px solid rgba(192,124,0,0.3)}
  .callout.r{top:340px;right:80px;color:var(--red);background:rgba(222,50,38,0.15);border:1px solid rgba(222,50,38,0.3)}
  #tag{position:absolute;bottom:70px;left:0;right:0;text-align:center;font-size:26px;font-weight:700;color:var(--cream);letter-spacing:-0.01em}
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  tl.fromTo("#window",{opacity:0,x:60},{opacity:1,x:0,duration:0.8,ease:"power3.out"},0.3);
  tl.fromTo("#callout1",{opacity:0,x:20},{opacity:1,x:0,duration:0.4,ease:"power3.out"},2.0);
  tl.fromTo("#callout2",{opacity:0,x:20},{opacity:1,x:0,duration:0.4,ease:"power3.out"},3.0);
  tl.fromTo("#callout3",{opacity:0,x:20},{opacity:1,x:0,duration:0.4,ease:"power3.out"},4.0);
  tl.fromTo("#tag",{opacity:0,y:10},{opacity:1,y:0,duration:0.6,ease:"power3.out"},6.5);
  window.__timelines["04-dashboard"]=tl;
</script>
</template>
</body>
</html>
